name: tests

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: python -m pip install -U pip && python -m pip install -e . pytest
      - name: Run tests
        run: pytest -q
      - name: Windows scheduled-wrapper path quoting smoke
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File "scripts\run_morning_alarm.ps1" -RepoRoot "$PWD" -TargetDir "$env:TEMP\My Drive\Sessiontosong Alarms" -Python "python" -SmokeTestArgumentQuoting
